# Scripted benchmark matrix (optional; headless timing is usually enough — see README.md)
#   python utils/benchmark/benchmark.py run matrix.cfg --scene resources/shader_ball.gltf

SEQUENCE "Warmup - load scene and HDR environment"
--sequenceframes 256
--sequenceaverages 64
--sequenceresetframes 32
--envSystem 1
--renderSystem 0
--ptSamples 1
--maxFrames 1
--ptAdaptiveSampling 0
--fitScene
--resetFrame

SEQUENCE "Path tracer - camera 0 - 1 spp"
